<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Skill</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
  <nav class="navbar">
    <div class="nav-brand">
      <div class="logo-icon small">S</div>
      <span>Smart Skill</span>
    </div>
    <!-- Desktop nav -->
    <div class="nav-tabs">
      <button class="nav-tab" id="tab-btn-videos" onclick="showTab('videos', event)">Видео</button>
      <button class="nav-tab" id="tab-btn-chat" onclick="showTab('chat', event)">
        💬 Чат
        <span id="unreadBadge" class="unread-badge hidden"></span>
      </button>
      <button class="nav-tab" id="tab-btn-profile" onclick="showTab('profile', event)">Профиль</button>
    </div>
    <div class="nav-right">
      <div class="nav-user-avatar" id="navAvatarWrap">
        <div id="navAvatar" class="avatar-circle xsmall"></div>
        <span class="nav-online-dot"></span>
      </div>
      <span id="navUsername" class="nav-username"></span>
      <button onclick="logout()" class="btn-logout">Выйти</button>
      <button class="burger" onclick="toggleMobileMenu()">☰</button>
    </div>
  </nav>

  <!-- Mobile dropdown (separate from desktop nav) -->
  <div id="mobileDropdown" class="mobile-dropdown">
    <button onclick="showTab('videos', null); closeMobileMenu()">📹 Видео</button>
    <button onclick="showTab('chat', null); closeMobileMenu()">💬 Чат <span id="unreadBadgeMobile" class="unread-badge hidden"></span></button>
    <button onclick="showTab('profile', null); closeMobileMenu()">👤 Профиль</button>
    <button onclick="logout()" class="mobile-menu-logout">🚪 Выйти</button>
  </div>
  <div id="mobileOverlay" class="mobile-overlay" onclick="closeMobileMenu()"></div>

  <main class="main-content">

    <!-- Videos tab -->
    <div id="tab-videos" class="hidden">
      <h2 class="section-title">Видео</h2>
      <div id="videoGrid" class="video-grid"></div>
    </div>

    <!-- Chat tab -->
    <div id="tab-chat" class="hidden">
      <div class="chat-wrap">
        <div class="chat-header">
          <span>Общий чат</span>
          <span id="onlineCount" class="online-count"></span>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <form class="chat-form" onsubmit="sendMessage(event)">
          <input type="text" id="chatInput" placeholder="Написать сообщение..." maxlength="1000" autocomplete="off">
          <button type="submit" class="chat-send">➤</button>
        </form>
      </div>
    </div>

    <!-- Profile tab -->
    <div id="tab-profile" class="hidden">
      <div class="profile-card">
        <div class="profile-header">
          <div class="avatar-wrap">
            <div id="avatarCircle" class="avatar-circle large"></div>
            <label class="avatar-upload-btn" title="Загрузить фото">
              <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
              📷
            </label>
          </div>
          <div class="profile-header-info">
            <h1 id="profileUsername"></h1>
            <span class="role-badge role-user">Пользователь</span>
            <p id="profileEmail" class="profile-email"></p>
          </div>
          <button onclick="toggleEdit()" class="btn-secondary" id="editBtn">Редактировать</button>
        </div>

        <div id="viewMode" class="profile-body">
          <div class="info-grid">
            <div class="info-item"><label>Полное имя</label><p id="viewFullName">—</p></div>
            <div class="info-item"><label>Телефон</label><p id="viewPhone">—</p></div>
            <div class="info-item"><label>Email</label><p id="viewEmail">—</p></div>
            <div class="info-item"><label>Дата регистрации</label><p id="viewCreated">—</p></div>
            <div class="info-item"><label>Последний вход</label><p id="viewLastLogin">—</p></div>
          </div>
          <div class="info-item full-width"><label>О себе</label><p id="viewBio">—</p></div>
        </div>

        <form id="editMode" class="profile-body hidden" onsubmit="saveProfile(event)">
          <div class="info-grid">
            <div class="form-group"><label>Полное имя</label><input type="text" id="editFullName"></div>
            <div class="form-group"><label>Телефон</label><input type="tel" id="editPhone"></div>
          </div>
          <div class="form-group"><label>О себе</label><textarea id="editBio" rows="4"></textarea></div>
          <div id="editError" class="error-msg"></div>
          <div id="editSuccess" class="success-msg"></div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Сохранить</button>
            <button type="button" onclick="toggleEdit()" class="btn-ghost">Отмена</button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <script>
    let userData = null;
    let editing = false;
    let refreshInterval = null;
    let currentTab = 'videos';

    function showTab(name, e) {
      document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.remove('hidden');
      const btn = document.getElementById('tab-btn-' + name);
      if (btn) btn.classList.add('active');
      currentTab = name;
      closeMobileMenu();
      if (name === 'videos') loadVideos();
      if (name === 'chat') { setUnread(0); scrollChat(); }
      window.location.hash = name;
    }

    function toggleMobileMenu() {
      document.getElementById('mobileDropdown').classList.toggle('open');
      document.getElementById('mobileOverlay').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('mobileDropdown').classList.remove('open');
      document.getElementById('mobileOverlay').classList.remove('open');
    }

    async function loadProfile() {
      const res = await fetch('/api/profile');
      if (!res.ok) { window.location.href = '/index.html'; return; }
      const fresh = await res.json();
      if (fresh.role === 'admin') { window.location.href = '/admin.html'; return; }

      // Detect role change
      if (userData && userData.role !== fresh.role) {
        window.location.reload();
        return;
      }
      userData = fresh;
      document.getElementById('navUsername').textContent = userData.username;
      renderProfile();
    }

    function setAvatarEl(el, user) {
      if (user.avatar_data) {
        el.style.backgroundImage = `url(${user.avatar_data})`;
        el.style.backgroundSize = 'cover';
        el.style.backgroundPosition = 'center';
        el.style.background = '';
        el.textContent = '';
      } else {
        el.style.backgroundImage = '';
        el.style.background = user.avatar_color;
        el.textContent = user.username[0].toUpperCase();
      }
    }

    function renderProfile() {
      setAvatarEl(document.getElementById('avatarCircle'), userData);
      setAvatarEl(document.getElementById('navAvatar'), userData);
      document.getElementById('profileUsername').textContent = userData.username;
      document.getElementById('profileEmail').textContent = userData.email;
      document.getElementById('viewFullName').textContent = userData.full_name || '—';
      document.getElementById('viewPhone').textContent = userData.phone || '—';
      document.getElementById('viewEmail').textContent = userData.email;
      document.getElementById('viewCreated').textContent = formatDate(userData.created_at);
      document.getElementById('viewLastLogin').textContent = userData.last_login ? formatDate(userData.last_login) : 'Первый вход';
      document.getElementById('viewBio').textContent = userData.bio || '—';
    }

    async function uploadAvatar(input) {
      const file = input.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('avatar', file);
      const res = await fetch('/api/upload/avatar', { method: 'POST', body: form });
      if (res.ok) {
        const d = await res.json();
        userData.avatar_data = d.avatar_data;
        renderProfile();
        showToast('Аватар обновлён!');
      }
    }

    function toggleEdit() {
      editing = !editing;
      document.getElementById('viewMode').classList.toggle('hidden', editing);
      document.getElementById('editMode').classList.toggle('hidden', !editing);
      document.getElementById('editBtn').textContent = editing ? 'Отмена' : 'Редактировать';
      if (editing) {
        document.getElementById('editFullName').value = userData.full_name || '';
        document.getElementById('editPhone').value = userData.phone || '';
        document.getElementById('editBio').value = userData.bio || '';
      }
    }

    async function saveProfile(e) {
      e.preventDefault();
      const res = await fetch('/api/profile', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name: editFullName.value, phone: editPhone.value, bio: editBio.value })
      });
      if (res.ok) {
        showToast('Профиль сохранён!');
        await loadProfile();
        toggleEdit();
      }
    }

    async function loadVideos() {
      const res = await fetch('/api/videos');
      const videos = await res.json();
      const el = document.getElementById('videoGrid');
      if (!videos.length) { el.innerHTML = '<p class="empty-msg">Видео пока не добавлены</p>'; return; }
      el.innerHTML = videos.map(v => `
        <div class="video-card">
          <div class="video-embed">
            <iframe src="https://www.youtube.com/embed/${v.youtube_id}" frameborder="0" allowfullscreen loading="lazy"></iframe>
          </div>
          <p class="video-title">${v.title}</p>
        </div>
      `).join('');
    }

    let toastTimer;
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.classList.add('toast-show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('toast-show'), 3000);
    }

    function formatDate(d) {
      return new Date(d).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/index.html';
    }

    // ===== CHAT =====
    let ws = null;
    let unreadCount = 0;

    function setUnread(n) {
      unreadCount = n;
      const b1 = document.getElementById('unreadBadge');
      const b2 = document.getElementById('unreadBadgeMobile');
      if (n > 0) {
        const label = n > 99 ? '99+' : n;
        b1.textContent = label; b1.classList.remove('hidden');
        b2.textContent = label; b2.classList.remove('hidden');
      } else {
        b1.classList.add('hidden');
        b2.classList.add('hidden');
      }
    }

    function connectChat() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'history') { renderHistory(msg.messages); return; }
        if (msg.type === 'message') {
          appendMessage(msg);
          scrollChat();
          // Notify if not on chat tab and message is from someone else
          if (currentTab !== 'chat' && msg.user_id !== userData?.id) {
            setUnread(unreadCount + 1);
            showChatToast(msg.username, msg.text);
          }
          return;
        }
        if (msg.type === 'online') { updateOnline(msg.count); return; }
        if (msg.type === 'deleted') { document.getElementById('msg-' + msg.id)?.remove(); return; }
      };
      ws.onclose = () => setTimeout(connectChat, 3000);
    }

    let chatToastTimer;
    function showChatToast(username, text) {
      let t = document.getElementById('chatToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'chatToast';
        t.className = 'chat-toast';
        t.onclick = () => { showTab('chat', null); t.classList.remove('show'); };
        document.body.appendChild(t);
      }
      t.innerHTML = `<span class="ct-name">💬 ${username}</span><span class="ct-text">${escapeHtml(text.length > 50 ? text.slice(0,50)+'…' : text)}</span>`;
      t.classList.add('show');
      clearTimeout(chatToastTimer);
      chatToastTimer = setTimeout(() => t.classList.remove('show'), 4000);
    }

    function renderHistory(messages) {
      const el = document.getElementById('chatMessages');
      el.innerHTML = '';
      messages.forEach(m => appendMessage(m, false));
      scrollChat();
    }

    function appendMessage(m, scroll = true) {
      const el = document.getElementById('chatMessages');
      const isMine = m.user_id === userData?.id;
      const time = new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      const avatarStyle = m.avatar_data
        ? `background-image:url(${m.avatar_data});background-size:cover;background-position:center`
        : `background:${m.avatar_color}`;
      const avatarLetter = m.avatar_data ? '' : m.username[0].toUpperCase();
      const isAdmin = m.role === 'admin';

      const div = document.createElement('div');
      div.id = 'msg-' + m.id;
      div.className = `chat-msg ${isMine ? 'mine' : ''}`;
      div.innerHTML = `
        ${!isMine ? `<div class="chat-avatar" style="${avatarStyle}">${avatarLetter}</div>` : ''}
        <div class="chat-bubble-wrap">
          ${!isMine ? `<span class="chat-name ${isAdmin ? 'chat-admin' : ''}">${m.username}${isAdmin ? ' 🛡️' : ''}</span>` : ''}
          <div class="chat-bubble">${escapeHtml(m.text)}<span class="chat-time">${time}</span></div>
        </div>
        ${isMine ? `<div class="chat-avatar" style="${avatarStyle}">${avatarLetter}</div>` : ''}
      `;
      el.appendChild(div);
    }

    function scrollChat() {
      const el = document.getElementById('chatMessages');
      el.scrollTop = el.scrollHeight;
    }

    function updateOnline(count) {
      document.getElementById('onlineCount').textContent = `🟢 ${count} онлайн`;
      document.getElementById('onlineBadge').textContent = count;
    }

    function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ text }));
      input.value = '';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function init() {
      await loadProfile();
      const hash = window.location.hash.replace('#', '') || 'videos';
      showTab(['videos', 'profile', 'chat'].includes(hash) ? hash : 'videos', null);
      refreshInterval = setInterval(loadProfile, 30000);
      setInterval(() => { if (currentTab === 'videos') loadVideos(); }, 60000);
      connectChat();
    }

    init();
  </script>
</body>
</html>
