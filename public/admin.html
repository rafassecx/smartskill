<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Smart Skill</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
  <nav class="navbar admin-navbar">
    <div class="nav-brand">
      <div class="logo-icon small admin">S</div>
      <span>Smart Skill <span class="admin-label">Админ</span></span>
    </div>
    <!-- Desktop nav -->
    <div class="nav-tabs" id="adminNavTabs">
      <button class="nav-tab active" id="anav-dashboard" onclick="showSection('dashboard', event)">Обзор</button>
      <button class="nav-tab" id="anav-users" onclick="showSection('users', event)">Пользователи</button>
      <button class="nav-tab" id="anav-videos" onclick="showSection('videos', event)">Видео</button>
      <button class="nav-tab" id="anav-chat" onclick="showSection('chat', event)">💬 Чат</button>
      <button class="nav-tab" id="anav-myprofile" onclick="showSection('myprofile', event)">Мой профиль</button>
    </div>
    <div class="nav-right">
      <span id="liveIndicator" class="live-dot" title="Реальное время"></span>
      <span id="navUsername" class="nav-username"></span>
      <button onclick="logout()" class="btn-logout">Выйти</button>
      <button class="burger" onclick="toggleAdminMenu()">☰</button>
    </div>
  </nav>

  <!-- Mobile dropdown -->
  <div id="adminMobileDropdown" class="mobile-dropdown admin-dropdown">
    <button onclick="showSection('dashboard', null); closeMobileMenu()">📊 Обзор</button>
    <button onclick="showSection('users', null); closeMobileMenu()">👥 Пользователи</button>
    <button onclick="showSection('videos', null); closeMobileMenu()">📹 Видео</button>
    <button onclick="showSection('chat', null); closeMobileMenu()">💬 Чат</button>
    <button onclick="showSection('myprofile', null); closeMobileMenu()">👤 Мой профиль</button>
    <button onclick="logout()" class="mobile-menu-logout">🚪 Выйти</button>
  </div>
  <div id="adminMobileOverlay" class="mobile-overlay" onclick="closeMobileMenu()"></div>

  <main class="main-content">

    <!-- Dashboard -->
    <section id="section-dashboard" class="section active">
      <h2 class="section-title">Обзор</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-info">
            <span id="statTotal" class="stat-num">—</span>
            <span class="stat-label">Всего пользователей</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🛡️</div>
          <div class="stat-info">
            <span id="statAdmins" class="stat-num">—</span>
            <span class="stat-label">Администраторов</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📅</div>
          <div class="stat-info">
            <span id="statToday" class="stat-num">—</span>
            <span class="stat-label">Зарегистрировано сегодня</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🟢</div>
          <div class="stat-info">
            <span id="statOnline" class="stat-num">—</span>
            <span class="stat-label">Сейчас онлайн</span>
          </div>
        </div>
      </div>
      <div class="recent-card">
        <h3>Последние регистрации</h3>
        <div id="recentUsers" class="users-list"></div>
      </div>
    </section>

    <!-- Users -->
    <section id="section-users" class="section">
      <div class="section-header">
        <h2 class="section-title">Пользователи</h2>
        <div class="filters-row">
          <input type="text" id="searchInput" placeholder="Поиск..." class="search-input" oninput="applyFilters()">
          <select id="roleFilter" class="role-filter" onchange="applyFilters()">
            <option value="all">Все роли</option>
            <option value="user">Пользователи</option>
            <option value="admin">Администраторы</option>
          </select>
          <button onclick="exportCSV()" class="btn-export">⬇ CSV</button>
        </div>
      </div>
      <div id="usersList" class="users-table-wrap"></div>
    </section>

    <!-- Videos -->
    <section id="section-videos" class="section">
      <div class="section-header">
        <h2 class="section-title">Видео</h2>
      </div>
      <div class="video-add-card">
        <h3>Добавить видео</h3>
        <form onsubmit="addVideo(event)" class="video-add-form">
          <input type="text" id="videoTitle" placeholder="Название видео" required>
          <input type="text" id="videoUrl" placeholder="Ссылка YouTube (https://youtube.com/watch?v=...)" required>
          <button type="submit" class="btn-primary" style="width:auto;padding:10px 24px">Добавить</button>
        </form>
        <div id="videoError" class="error-msg"></div>
      </div>
      <div id="adminVideoList" class="admin-video-list"></div>
    </section>

    <!-- Chat -->
    <section id="section-chat" class="section">
      <div class="chat-wrap">
        <div class="chat-header">
          <span>Общий чат</span>
          <span id="adminOnlineCount" class="online-count"></span>
        </div>
        <div id="adminChatMessages" class="chat-messages"></div>
        <form class="chat-form" onsubmit="adminSendMessage(event)">
          <input type="text" id="adminChatInput" placeholder="Написать сообщение..." maxlength="1000" autocomplete="off">
          <button type="submit" class="chat-send">➤</button>
        </form>
      </div>
    </section>

    <!-- My Profile -->
    <section id="section-myprofile" class="section">
      <div class="profile-card">
        <div class="profile-header">
          <div class="avatar-wrap">
            <div id="adminAvatarCircle" class="avatar-circle large"></div>
            <label class="avatar-upload-btn" title="Загрузить фото">
              <input type="file" accept="image/*" style="display:none" onchange="uploadAdminAvatar(this)">
              📷
            </label>
          </div>
          <div class="profile-header-info">
            <h1 id="adminUsername"></h1>
            <span class="role-badge role-admin">Администратор</span>
            <p id="adminEmail" class="profile-email"></p>
          </div>
          <button onclick="toggleAdminEdit()" class="btn-secondary" id="adminEditBtn">Редактировать</button>
        </div>
        <div id="adminViewMode" class="profile-body">
          <div class="info-grid">
            <div class="info-item"><label>Полное имя</label><p id="adminViewFullName">—</p></div>
            <div class="info-item"><label>Телефон</label><p id="adminViewPhone">—</p></div>
            <div class="info-item"><label>Email</label><p id="adminViewEmail">—</p></div>
            <div class="info-item"><label>Дата регистрации</label><p id="adminViewCreated">—</p></div>
          </div>
          <div class="info-item full-width"><label>О себе</label><p id="adminViewBio">—</p></div>
        </div>
        <form id="adminEditMode" class="profile-body hidden" onsubmit="saveAdminProfile(event)">
          <div class="info-grid">
            <div class="form-group"><label>Полное имя</label><input type="text" id="adminEditFullName"></div>
            <div class="form-group"><label>Телефон</label><input type="tel" id="adminEditPhone"></div>
          </div>
          <div class="form-group"><label>О себе</label><textarea id="adminEditBio" rows="4"></textarea></div>
          <div id="adminEditError" class="error-msg"></div>
          <div id="adminEditSuccess" class="success-msg"></div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Сохранить</button>
            <button type="button" onclick="toggleAdminEdit()" class="btn-ghost">Отмена</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Confirm Dialog -->
  <div id="confirmOverlay" class="modal-overlay hidden">
    <div class="confirm-dialog">
      <div class="confirm-icon">🗑️</div>
      <h3 id="confirmTitle">Удалить пользователя?</h3>
      <p id="confirmText"></p>
      <div class="confirm-actions">
        <button id="confirmOk" class="btn-danger">Удалить</button>
        <button onclick="closeConfirm()" class="btn-ghost">Отмена</button>
      </div>
    </div>
  </div>

  <!-- User Modal -->
  <div id="userModal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('userModal').classList.add('hidden')">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    let allUsers = [];
    let adminData = null;
    let adminEditing = false;
    let prevUserIds = new Set();

    async function init() {
      const res = await fetch('/api/profile');
      if (!res.ok) { window.location.href = '/index.html'; return; }
      adminData = await res.json();
      if (adminData.role !== 'admin') { window.location.href = '/dashboard.html'; return; }
      document.getElementById('navUsername').textContent = adminData.username;
      fillAdminProfile();
      loadStats();
      loadUsers();
      connectSSE();
    }

    function fillAdminProfile() {
      const avatar = document.getElementById('adminAvatarCircle');
      setAvatar(avatar, adminData);
      document.getElementById('adminUsername').textContent = adminData.username;
      document.getElementById('adminEmail').textContent = adminData.email;
      document.getElementById('adminViewFullName').textContent = adminData.full_name || '—';
      document.getElementById('adminViewPhone').textContent = adminData.phone || '—';
      document.getElementById('adminViewEmail').textContent = adminData.email;
      document.getElementById('adminViewCreated').textContent = formatDate(adminData.created_at);
      document.getElementById('adminViewBio').textContent = adminData.bio || '—';
    }

    function setAvatar(el, user) {
      if (user.avatar_data) {
        el.style.backgroundImage = `url(${user.avatar_data})`;
        el.style.backgroundSize = 'cover';
        el.style.backgroundPosition = 'center';
        el.textContent = '';
        el.style.background = '';
      } else {
        el.style.backgroundImage = '';
        el.textContent = user.username[0].toUpperCase();
        el.style.background = user.avatar_color;
      }
    }

    async function uploadAdminAvatar(input) {
      const file = input.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('avatar', file);
      const res = await fetch('/api/upload/avatar', { method: 'POST', body: form });
      if (res.ok) {
        const d = await res.json();
        adminData.avatar_data = d.avatar_data;
        fillAdminProfile();
      }
    }

    function connectSSE() {
      const es = new EventSource('/api/admin/stream');
      es.addEventListener('connected', () => document.getElementById('liveIndicator').classList.add('live-dot--on'));
      es.addEventListener('user_registered', () => { loadUsers(); loadStats(); showToast('🆕 Новый пользователь зарегистрировался'); });
      es.addEventListener('user_deleted', () => { loadUsers(); loadStats(); });
      es.onerror = () => {
        document.getElementById('liveIndicator').classList.remove('live-dot--on');
        setTimeout(connectSSE, 3000); es.close();
      };
    }

    async function loadStats() {
      const s = await fetch('/api/admin/stats').then(r => r.json());
      document.getElementById('statTotal').textContent = s.total;
      document.getElementById('statAdmins').textContent = s.admins;
      document.getElementById('statToday').textContent = s.today;
    }

    let onlineIds = new Set();

    async function loadUsers() {
      const [usersRes, onlineRes] = await Promise.all([
        fetch('/api/admin/users'),
        fetch('/api/online')
      ]);
      allUsers = await usersRes.json();
      const online = await onlineRes.json();
      onlineIds = new Set(online.ids);
      applyFilters();
      renderRecentUsers(allUsers.slice(0, 5));
      document.getElementById('statOnline').textContent = online.count;
    }

    function applyFilters() {
      const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
      const role = document.getElementById('roleFilter')?.value || 'all';
      const filtered = allUsers.filter(u => {
        const matchRole = role === 'all' || u.role === role;
        const matchSearch = !search || u.username.toLowerCase().includes(search) || u.email.toLowerCase().includes(search) || (u.full_name || '').toLowerCase().includes(search);
        return matchRole && matchSearch;
      });
      renderUsersTable(filtered);
    }

    function renderRecentUsers(users) {
      const el = document.getElementById('recentUsers');
      if (!users.length) { el.innerHTML = '<p class="empty-msg">Нет пользователей</p>'; return; }
      el.innerHTML = users.map(u => `
        <div class="user-row" onclick="showUser(${u.id})">
          <div class="avatar-circle small ${u.avatar_data ? 'has-photo' : ''}" style="${u.avatar_data ? `background-image:url(${u.avatar_data});background-size:cover;background-position:center` : `background:${u.avatar_color}`}">${u.avatar_data ? '' : u.username[0].toUpperCase()}</div>
          <div class="user-row-info"><strong>${u.username}</strong><span>${u.email}</span></div>
          <span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${u.role === 'admin' ? 'Админ' : 'Польз.'}</span>
          <span class="user-date">${formatDate(u.created_at)}</span>
        </div>
      `).join('');
    }

    function renderUsersTable(users) {
      const el = document.getElementById('usersList');
      if (!users.length) { el.innerHTML = '<p class="empty-msg">Пользователи не найдены</p>'; prevUserIds = new Set(); return; }
      const newIds = new Set(users.map(u => u.id));
      el.innerHTML = `
        <table class="users-table">
          <thead><tr>
            <th>Пользователь</th><th>Email</th><th>Пароль</th>
            <th>Полное имя</th><th>Телефон</th><th>Роль</th>
            <th>Дата регистрации</th><th>Действия</th>
          </tr></thead>
          <tbody>
            ${users.map(u => `
              <tr onclick="showUser(${u.id})" class="table-row${prevUserIds.size && !prevUserIds.has(u.id) ? ' row-new' : ''}">
                <td><div class="cell-user">
                  <div class="avatar-wrap-sm">
                    <div class="avatar-circle xsmall" style="${u.avatar_data ? `background-image:url(${u.avatar_data});background-size:cover;background-position:center` : `background:${u.avatar_color}`}">${u.avatar_data ? '' : u.username[0].toUpperCase()}</div>
                    ${onlineIds.has(u.id) ? '<span class="online-dot"></span>' : ''}
                  </div>
                  ${u.username}
                </div></td>
                <td>${u.email}</td>
                <td><span class="password-cell">${u.plain_password || '—'}</span></td>
                <td>${u.full_name || '—'}</td>
                <td>${u.phone || '—'}</td>
                <td><span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${u.role === 'admin' ? 'Админ' : 'Польз.'}</span></td>
                <td>${formatDate(u.created_at)}</td>
                <td onclick="event.stopPropagation()"></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.querySelectorAll('.table-row').forEach((row, i) => {
        const u = users[i];
        const cell = row.querySelector('td:last-child');
        if (u.email === adminData?.email) {
          cell.innerHTML = '<span class="self-label">Это вы</span>';
        } else {
          cell.innerHTML = '<button class="btn-danger-sm">Удалить</button>';
          cell.querySelector('button').onclick = e => { e.stopPropagation(); deleteUser(u.id, u.username); };
        }
      });
      prevUserIds = newIds;
    }

    function exportCSV() {
      window.location.href = '/api/admin/export/csv';
    }

    async function showUser(id) {
      const u = await fetch(`/api/admin/users/${id}`).then(r => r.json());
      const avatarStyle = u.avatar_data
        ? `background-image:url(${u.avatar_data});background-size:cover;background-position:center`
        : `background:${u.avatar_color}`;
      document.getElementById('modalContent').innerHTML = `
        <div class="modal-user-header">
          <div class="avatar-circle large" style="${avatarStyle}">${u.avatar_data ? '' : u.username[0].toUpperCase()}</div>
          <div>
            <h2>${u.username}</h2>
            <span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${u.role === 'admin' ? 'Администратор' : 'Пользователь'}</span>
          </div>
        </div>
        <div class="modal-info-grid">
          <div class="info-item"><label>Email</label><p>${u.email}</p></div>
          <div class="info-item"><label>Пароль</label><p class="password-reveal">${u.plain_password || '—'}</p></div>
          <div class="info-item"><label>Полное имя</label><p>${u.full_name || '—'}</p></div>
          <div class="info-item"><label>Телефон</label><p>${u.phone || '—'}</p></div>
          <div class="info-item"><label>ID</label><p>#${u.id}</p></div>
          <div class="info-item"><label>Зарегистрирован</label><p>${formatDate(u.created_at)}</p></div>
          <div class="info-item"><label>Последний вход</label><p>${u.last_login ? formatDate(u.last_login) : 'Ещё не входил'}</p></div>
        </div>
        <div class="info-item full-width" style="margin-top:16px"><label>О себе</label><p>${u.bio || '—'}</p></div>
        ${u.email !== adminData?.email ? `<div class="modal-actions"><button onclick="document.getElementById('userModal').classList.add('hidden');deleteUser(${u.id},'${u.username}')" class="btn-danger">Удалить пользователя</button></div>` : ''}
      `;
      document.getElementById('userModal').classList.remove('hidden');
    }

    function closeModal(e) {
      if (e.target.id === 'userModal') document.getElementById('userModal').classList.add('hidden');
    }

    function showConfirm(title, text, onOk) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmText').textContent = text;
      document.getElementById('confirmOverlay').classList.remove('hidden');
      const btn = document.getElementById('confirmOk');
      btn.onclick = async () => { closeConfirm(); await onOk(); };
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.add('hidden');
    }

    async function deleteUser(id, username) {
      showConfirm(
        'Удалить пользователя?',
        `Пользователь "${username}" будет удалён навсегда. Это действие нельзя отменить.`,
        async () => {
          const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
          if (res.ok) { loadUsers(); loadStats(); showToast('Пользователь удалён'); }
          else { const d = await res.json(); showToast('Ошибка: ' + d.error); }
        }
      );
    }

    // Videos
    async function loadAdminVideos() {
      const videos = await fetch('/api/videos').then(r => r.json());
      const el = document.getElementById('adminVideoList');
      if (!videos.length) { el.innerHTML = '<p class="empty-msg">Видео не добавлены</p>'; return; }
      el.innerHTML = videos.map(v => `
        <div class="admin-video-item">
          <img src="https://img.youtube.com/vi/${v.youtube_id}/mqdefault.jpg" class="video-thumb">
          <div class="admin-video-info">
            <strong>${v.title}</strong>
            <span>youtube.com/watch?v=${v.youtube_id}</span>
            <span class="user-date">${formatDate(v.added_at)}</span>
          </div>
          <button onclick="deleteVideo(${v.id})" class="btn-danger-sm">Удалить</button>
        </div>
      `).join('');
    }

    async function addVideo(e) {
      e.preventDefault();
      const errEl = document.getElementById('videoError');
      errEl.textContent = '';
      const res = await fetch('/api/admin/videos', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title: videoTitle.value, youtube_url: videoUrl.value })
      });
      if (res.ok) {
        videoTitle.value = ''; videoUrl.value = '';
        loadAdminVideos();
      } else {
        const d = await res.json(); errEl.textContent = d.error;
      }
    }

    async function deleteVideo(id) {
      showConfirm(
        'Удалить видео?',
        'Видео будет удалено из списка для всех пользователей.',
        async () => {
          await fetch(`/api/admin/videos/${id}`, { method: 'DELETE' });
          loadAdminVideos();
          showToast('Видео удалено');
        }
      );
    }

    function toggleAdminMenu() {
      document.getElementById('adminMobileDropdown').classList.toggle('open');
      document.getElementById('adminMobileOverlay').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('adminMobileDropdown').classList.remove('open');
      document.getElementById('adminMobileOverlay').classList.remove('open');
    }

    function showSection(name, e) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('active');
      if (e) e.target.classList.add('active');
      document.getElementById('adminNavTabs').classList.remove('mobile-open');
      if (name === 'videos') loadAdminVideos();
    }

    function toggleAdminEdit() {
      adminEditing = !adminEditing;
      document.getElementById('adminViewMode').classList.toggle('hidden', adminEditing);
      document.getElementById('adminEditMode').classList.toggle('hidden', !adminEditing);
      document.getElementById('adminEditBtn').textContent = adminEditing ? 'Отмена' : 'Редактировать';
      if (adminEditing) {
        document.getElementById('adminEditFullName').value = adminData.full_name || '';
        document.getElementById('adminEditPhone').value = adminData.phone || '';
        document.getElementById('adminEditBio').value = adminData.bio || '';
      }
    }

    async function saveAdminProfile(e) {
      e.preventDefault();
      const res = await fetch('/api/profile', {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ full_name: adminEditFullName.value, phone: adminEditPhone.value, bio: adminEditBio.value })
      });
      if (res.ok) {
        document.getElementById('adminEditSuccess').textContent = 'Сохранено!';
        const r = await fetch('/api/profile');
        adminData = await r.json();
        setTimeout(() => { document.getElementById('adminEditSuccess').textContent = ''; fillAdminProfile(); toggleAdminEdit(); }, 800);
      }
    }

    let toastTimer;
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.classList.add('toast-show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('toast-show'), 3000);
    }

    function formatDate(d) {
      return new Date(d).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    // ===== ADMIN CHAT =====
    let adminWs = null;

    function connectAdminChat() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      adminWs = new WebSocket(`${proto}://${location.host}`);
      adminWs.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'history') { renderAdminHistory(msg.messages); return; }
        if (msg.type === 'message') { appendAdminMessage(msg); adminScrollChat(); return; }
        if (msg.type === 'online') { document.getElementById('adminOnlineCount').textContent = `🟢 ${msg.count} онлайн`; return; }
        if (msg.type === 'deleted') { document.getElementById('amsg-' + msg.id)?.remove(); return; }
      };
      adminWs.onclose = () => setTimeout(connectAdminChat, 3000);
    }

    function renderAdminHistory(messages) {
      const el = document.getElementById('adminChatMessages');
      el.innerHTML = '';
      messages.forEach(m => appendAdminMessage(m, false));
      adminScrollChat();
    }

    function appendAdminMessage(m) {
      const el = document.getElementById('adminChatMessages');
      const isMine = m.user_id === adminData?.id;
      const time = new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      const avatarStyle = m.avatar_data
        ? `background-image:url(${m.avatar_data});background-size:cover;background-position:center`
        : `background:${m.avatar_color}`;
      const avatarLetter = m.avatar_data ? '' : m.username[0].toUpperCase();
      const isAdmin = m.role === 'admin';

      const div = document.createElement('div');
      div.id = 'amsg-' + m.id;
      div.className = `chat-msg ${isMine ? 'mine' : ''}`;
      div.innerHTML = `
        ${!isMine ? `<div class="chat-avatar" style="${avatarStyle}">${avatarLetter}</div>` : ''}
        <div class="chat-bubble-wrap">
          ${!isMine ? `<span class="chat-name ${isAdmin ? 'chat-admin' : ''}">${m.username}${isAdmin ? ' 🛡️' : ''}</span>` : ''}
          <div class="chat-bubble">
            ${escapeHtml(m.text)}
            <span class="chat-time">${time}</span>
            <button class="chat-delete-btn" onclick="deleteChatMsg(${m.id})" title="Удалить">✕</button>
          </div>
        </div>
        ${isMine ? `<div class="chat-avatar" style="${avatarStyle}">${avatarLetter}</div>` : ''}
      `;
      el.appendChild(div);
    }

    function adminScrollChat() {
      const el = document.getElementById('adminChatMessages');
      el.scrollTop = el.scrollHeight;
    }

    function adminSendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('adminChatInput');
      const text = input.value.trim();
      if (!text || !adminWs || adminWs.readyState !== 1) return;
      adminWs.send(JSON.stringify({ text }));
      input.value = '';
    }

    async function deleteChatMsg(id) {
      await fetch(`/api/chat/messages/${id}`, { method: 'DELETE' });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/index.html';
    }

    init();
    connectAdminChat();
  </script>
</body>
</html>
