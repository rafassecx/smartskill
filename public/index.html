<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Smart Skill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon">S</div>
      <span>Smart Skill</span>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Войти</button>
      <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form" onsubmit="login(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <div id="loginError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Войти</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form hidden" onsubmit="register(event)">
      <div class="form-group">
        <label>Имя пользователя *</label>
        <input type="text" id="regUsername" placeholder="username" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Пароль *</label>
        <input type="password" id="regPassword" placeholder="Минимум 6 символов" required>
      </div>
      <div class="form-group">
        <label>Полное имя</label>
        <input type="text" id="regFullName" placeholder="Иван Иванов">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="tel" id="regPhone" placeholder="+7 999 000 00 00">
      </div>
      <div id="registerError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Создать аккаунт</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/profile').then(r => {
      if (r.ok) return r.json().then(u => {
        window.location.href = u.role === 'admin' ? '/admin.html' : '/dashboard.html';
      });
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Form').classList.remove('hidden');
    }

    async function login(e) {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = 'Вход...';

      const res = await fetch('/api/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = data.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } else {
        errEl.textContent = data.error;
        btn.disabled = false; btn.textContent = 'Войти';
      }
    }

    async function register(e) {
      e.preventDefault();
      const errEl = document.getElementById('registerError');
      errEl.textContent = '';
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = 'Создание...';

      const res = await fetch('/api/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: regUsername.value,
          email: regEmail.value,
          password: regPassword.value,
          full_name: regFullName.value,
          phone: regPhone.value
        })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = data.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } else {
        errEl.textContent = data.error;
        btn.disabled = false; btn.textContent = 'Создать аккаунт';
      }
    }
  </script>
</body>
</html>
